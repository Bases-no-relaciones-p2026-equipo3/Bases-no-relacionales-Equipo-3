name: spark-cluster
networks:
    spark-cluster:
        driver: bridge
    # Redes externas — permiten que los workers alcancen Cassandra y Neo4j
    cassandra-net:
        external: true
        name: cassandra-cluster_cassandra-cluster
    neo4j-net:
        external: true
        name: neo4j-compose_default
services:
    spark-master:
        image: apache/spark:3.5.7-scala2.12-java17-python3-ubuntu
        container_name: spark-master
        user: root
        command: bash -c "/opt/spark/bin/spark-class org.apache.spark.deploy.$$SPARK_MODE.$${SPARK_MODE^}
            --host 0.0.0.0 --port $$SPARK_MASTER_PORT --webui-port
            $$SPARK_MASTER_WEBUI_PORT"
        environment:
        - PYSPARK_PYTHON=python3
        - SPARK_MODE=master
        - SPARK_MASTER_PORT=6077
        - SPARK_MASTER_WEBUI_PORT=6080
        - SPARK_DAEMON_MEMORY=1G
        volumes:
        - ./mount/shared-workspace:/opt/spark/shared-workspace
        - ./mount/spark-master:/opt/spark/work-dir
#        - .\jars\delta-spark_2.12-3.2.0.jar:/opt/spark/jars/delta-spark_2.12-3.2.0.jar
#        - .\jars\delta-storage-3.2.0.jar:/opt/spark/jars/delta-storage-3.2.0.jar
#        - .\jars\iceberg-spark-runtime-3.5_2.12-1.6.1.jar:/opt/spark/jars/iceberg-spark-runtime-3.5_2.12-1.6.1.jar
        networks:
        - spark-cluster
        - cassandra-net
        - neo4j-net
        ports:
        - 6080:6080
        - 6077:6077
        extra_hosts:
        - host.docker.internal:host-gateway
        dns: &id001
        - 10.15.30.1
        deploy:
            resources:
                limits:
                    cpus: '2.0'
                    memory: 1G
        healthcheck:
            test:
            - CMD
            - curl
            - -f
            - http://localhost:6080
            interval: 10s
            timeout: 10s
            retries: 10
            start_period: 10s
    spark-jupyter:
        image: spark-jupyter:3.5.7-scala2.12-java17-python3-ubuntu
        container_name: spark-jupyter
        user: root
        command:
        - bash
        - -c
        - jupyter lab --ip=0.0.0.0 --port=6888 --no-browser --allow-root --NotebookApp.token=''
            --NotebookApp.password='' --NotebookApp.allow_origin='*' --ServerApp.disable_check_xsrf=True
            --ServerApp.root_dir=/opt/spark/work-dir
        environment:
        - PYSPARK_PYTHON=python3
        - SPARK_EXECUTOR_MEMORY=1536M
        volumes:
        - ./mount/shared-workspace:/opt/spark/shared-workspace
        - ./mount/spark-jupyter:/opt/spark/work-dir
        - ./vscode_server:/root/.vscode-server
#        - ./jars/delta-spark_2.12-3.2.0.jar:/opt/spark/jars/delta-spark_2.12-3.2.0.jar
#        - ./jars/delta-storage-3.2.0.jar:/opt/spark/jars/delta-storage-3.2.0.jar
#        - ./jars/iceberg-spark-runtime-3.5_2.12-1.6.1.jar:/opt/spark/jars/iceberg-spark-runtime-3.5_2.12-1.6.1.jar
        networks:
        - spark-cluster
        - cassandra-net
        - neo4j-net
        ports:
        - 6888:6888
        - 4040:4040
        extra_hosts:
        - host.docker.internal:host-gateway
        dns: *id001
        deploy:
            resources:
                limits:
                    cpus: '2.0'
                    memory: 1G
        healthcheck:
            test:
            - CMD
            - curl
            - -f
            - http://localhost:6888
            interval: 10s
            timeout: 10s
            retries: 10
            start_period: 10s
    spark-worker-1:
        image: apache/spark:3.5.7-scala2.12-java17-python3-ubuntu
        container_name: spark-worker-1
        user: root
        command: bash -c "/opt/spark/bin/spark-class org.apache.spark.deploy.$$SPARK_MODE.$${SPARK_MODE^}
            $$SPARK_MASTER_URL --host spark-worker-1.rgorosti.vpn.itam.mx --webui-port
            $$SPARK_WORKER_WEBUI_PORT"
        environment:
        - PYSPARK_PYTHON=python3
        - SPARK_MODE=worker
        - SPARK_WORKER_CORES=2
        - SPARK_DAEMON_MEMORY=512M
        - SPARK_WORKER_MEMORY=2048M
        - SPARK_WORKER_WEBUI_PORT=6081
        - SPARK_MASTER_URL=spark://spark-master:6077
        volumes:
        - ./mount/shared-workspace:/opt/spark/shared-workspace
        - ./mount/spark-worker-1:/opt/spark/work-dir
#        - ./jars/delta-spark_2.12-3.2.0.jar:/opt/spark/jars/delta-spark_2.12-3.2.0.jar
#        - ./jars/delta-storage-3.2.0.jar:/opt/spark/jars/delta-storage-3.2.0.jar
#        - ./jars/iceberg-spark-runtime-3.5_2.12-1.6.1.jar:/opt/spark/jars/iceberg-spark-runtime-3.5_2.12-1.6.1.jar
        networks:
        - spark-cluster
        - cassandra-net
        - neo4j-net
        hostname: spark-worker-1.rgorosti.vpn.itam.mx
        ports:
        - 6081:6081
        extra_hosts:
        - host.docker.internal:host-gateway
        dns: *id001
        deploy:
            resources:
                limits:
                    cpus: '4.0'
                    memory: 1.5G
        depends_on:
            spark-master:
                condition: service_healthy
            spark-jupyter:
                condition: service_healthy
        healthcheck:
            test:
            - CMD
            - curl
            - -f
            - http://localhost:6081
            interval: 10s
            timeout: 10s
            retries: 10
            start_period: 10s
    spark-worker-2:
        image: apache/spark:3.5.7-scala2.12-java17-python3-ubuntu
        container_name: spark-worker-2
        user: root
        command: bash -c "/opt/spark/bin/spark-class org.apache.spark.deploy.$$SPARK_MODE.$${SPARK_MODE^}
            $$SPARK_MASTER_URL --host spark-worker-2.rgorosti.vpn.itam.mx --webui-port
            $$SPARK_WORKER_WEBUI_PORT"
        environment:
        - PYSPARK_PYTHON=python3
        - SPARK_MODE=worker
        - SPARK_WORKER_CORES=2
        - SPARK_DAEMON_MEMORY=512M
        - SPARK_WORKER_MEMORY=2048M
        - SPARK_WORKER_WEBUI_PORT=6082
        - SPARK_MASTER_URL=spark://spark-master:6077
        volumes:
        - ./mount/shared-workspace:/opt/spark/shared-workspace
        - ./mount/spark-worker-2:/opt/spark/work-dir
#        - ./jars/delta-spark_2.12-3.2.0.jar:/opt/spark/jars/delta-spark_2.12-3.2.0.jar
#        - ./jars/delta-storage-3.2.0.jar:/opt/spark/jars/delta-storage-3.2.0.jar
#        - ./jars/iceberg-spark-runtime-3.5_2.12-1.6.1.jar:/opt/spark/jars/iceberg-spark-runtime-3.5_2.12-1.6.1.jar
        networks:
        - spark-cluster
        - cassandra-net
        - neo4j-net
        hostname: spark-worker-2.rgorosti.vpn.itam.mx
        ports:
        - 6082:6082
        extra_hosts:
        - host.docker.internal:host-gateway
        dns: *id001
        deploy:
            resources:
                limits:
                    cpus: '4.0'
                    memory: 1.5G
        depends_on:
            spark-master:
                condition: service_healthy
            spark-jupyter:
                condition: service_healthy
            spark-worker-1:
                condition: service_started
        healthcheck:
            test:
            - CMD
            - curl
            - -f
            - http://localhost:6082
            interval: 10s
            timeout: 10s
            retries: 10
            start_period: 10s
    spark-worker-3:
        image: apache/spark:3.5.7-scala2.12-java17-python3-ubuntu
        container_name: spark-worker-3
        user: root
        command: bash -c "/opt/spark/bin/spark-class org.apache.spark.deploy.$$SPARK_MODE.$${SPARK_MODE^}
            $$SPARK_MASTER_URL --host spark-worker-3.rgorosti.vpn.itam.mx --webui-port
            $$SPARK_WORKER_WEBUI_PORT"
        environment:
        - PYSPARK_PYTHON=python3
        - SPARK_MODE=worker
        - SPARK_WORKER_CORES=2
        - SPARK_DAEMON_MEMORY=512M
        - SPARK_WORKER_MEMORY=2048M
        - SPARK_WORKER_WEBUI_PORT=6083
        - SPARK_MASTER_URL=spark://spark-master:6077
        volumes:
        - ./mount/shared-workspace:/opt/spark/shared-workspace
        - ./mount/spark-worker-3:/opt/spark/work-dir
#        - ./jars/delta-spark_2.12-3.2.0.jar:/opt/spark/jars/delta-spark_2.12-3.2.0.jar
#        - ./jars/delta-storage-3.2.0.jar:/opt/spark/jars/delta-storage-3.2.0.jar
#        - ./jars/iceberg-spark-runtime-3.5_2.12-1.6.1.jar:/opt/spark/jars/iceberg-spark-runtime-3.5_2.12-1.6.1.jar
        networks:
        - spark-cluster
        - cassandra-net
        - neo4j-net
        hostname: spark-worker-3.rgorosti.vpn.itam.mx
        ports:
        - 6083:6083
        extra_hosts:
        - host.docker.internal:host-gateway
        dns: *id001
        deploy:
            resources:
                limits:
                    cpus: '4.0'
                    memory: 1.5G
        depends_on:
            spark-master:
                condition: service_healthy
            spark-jupyter:
                condition: service_healthy
            spark-worker-1:
                condition: service_started
            spark-worker-2:
                condition: service_started
        healthcheck:
            test:
            - CMD
            - curl
            - -f
            - http://localhost:6083
            interval: 10s
            timeout: 10s
            retries: 10
            start_period: 10s
